name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: zig build
        run: zig build

      - name: zig build test
        run: zig build test --summary all

      - name: integration.sh
        run: ./tests/integration.sh

      - name: security.sh (unprivileged)
        run: ./tests/security.sh

      - name: harder.sh (unprivileged)
        run: ./tests/harder.sh

      - name: security.sh (root) — Linux only
        if: matrix.os == 'ubuntu-latest'
        run: sudo UIDJAIL_BIN=./zig-out/bin/uidjail ./tests/security.sh

      - name: harder.sh (root) — Linux only
        if: matrix.os == 'ubuntu-latest'
        run: sudo UIDJAIL_BIN=./zig-out/bin/uidjail ./tests/harder.sh

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build for all targets
        run: |
          for target in x86_64-linux-musl aarch64-linux-musl x86_64-macos aarch64-macos; do
            echo "=== $target ==="
            zig build -Dtarget=$target -Doptimize=ReleaseSmall
            ls -la zig-out/bin/
            file zig-out/bin/uidjail || true
            rm -rf zig-out
          done
